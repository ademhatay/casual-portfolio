<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — {{ site.brand }}</title>
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/portfolio.css">
  <script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
</head>
<body>

  <header class="top">
    <div class="wrap top__inner">
      <a class="brand" href="/">{{ site.brand }}</a>
      <div class="top__controls">
        <nav class="nav">
          {% assign navItems = nav.tr %}
          {% for item in navItems %}
            <a class="navlink{% if item.key == 'yazilar' %} active{% endif %}"
               href="{{ item.href }}">{{ item.label }}</a>
          {% endfor %}
        </nav>
        <div class="lang-switch">
          <span class="lang-btn lang-btn--active">TR</span>
          <a class="lang-btn" href="/en/writing/">EN</a>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Tema değiştir">
          <i data-lucide="sun" id="iconLight"></i>
          <i data-lucide="moon" id="iconDark" style="display:none;"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="wrap pagehead">
    <h1 class="title">{{ title }}</h1>
    <p class="subtitle">{{ date | date: "%d %B %Y" }}</p>
  </div>

  <main class="view fade">
    <div class="wrap">
      <article class="card prose yazi-detay">
        {{ content }}
      </article>
      <a class="yazi-geri" href="/yazilar/">← Tüm yazılar</a>
    </div>
  </main>

  {% include "footer.html" %}

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.lucide) window.lucide.createIcons();

      var html = document.documentElement;
      var btn  = document.getElementById('themeToggle');
      var sun  = document.getElementById('iconLight');
      var moon = document.getElementById('iconDark');

      function applyTheme(dark) {
        if (dark) {
          html.classList.add('dark');
          sun.style.display  = 'none';
          moon.style.display = '';
        } else {
          html.classList.remove('dark');
          sun.style.display  = '';
          moon.style.display = 'none';
        }
      }

      applyTheme(localStorage.getItem('theme') === 'dark');

      btn.addEventListener('click', function () {
        var isDark = html.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        applyTheme(!isDark);
      });

      // Copy buttons for code blocks
      document.querySelectorAll('.yazi-detay pre').forEach(function (pre) {
        var wrap = document.createElement('div');
        wrap.className = 'code-wrap';
        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(pre);

        var copyBtn = document.createElement('button');
        copyBtn.className = 'code-copy';
        copyBtn.setAttribute('aria-label', 'Kopyala');
        copyBtn.innerHTML = '<i data-lucide="copy"></i>';
        wrap.appendChild(copyBtn);

        copyBtn.addEventListener('click', function () {
          var code = pre.querySelector('code');
          navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(function () {
            copyBtn.innerHTML = '<i data-lucide="check"></i>';
            if (window.lucide) window.lucide.createIcons();
            setTimeout(function () {
              copyBtn.innerHTML = '<i data-lucide="copy"></i>';
              if (window.lucide) window.lucide.createIcons();
            }, 1800);
          });
        });
      });

      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>
</html>
